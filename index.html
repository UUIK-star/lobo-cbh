<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薄荷的作品集 </title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
background: #0a0a0d;
color: #e8e8e8;
line-height: 1.7;
overflow-x: hidden;
}

.container {
max-width: 1000px;
margin: 0 auto;
padding: 60px 20px;
}

/* 首页标题 */
.hero {
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 20px;
}

.hero h1 {
font-size: 36px;
margin-bottom: 12px;
letter-spacing: 2px;
color: #fff;
}

.hero p {
font-size: 16px;
color: #aaa;
max-width: 500px;
}

/* 板块样式 */
.section {
margin-bottom: 120px;
scroll-snap-align: start;
}

.section h2 {
font-size: 24px;
margin-bottom: 30px;
color: #ffffff;
border-left: 4px solid #7ab5ff;
padding-left: 12px;
}

.section p {
color: #cccccc;
margin-bottom: 20px;
font-size: 15px;
}

/* 图片网格 */
.grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 20px;
margin-top: 20px;
}

.grid img {
width: 100%;
height: 280px;
object-fit: cover;
border-radius: 8px;
transition: 0.3s;
box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.grid img:hover {
transform: translateY(-6px);
box-shadow: 0 12px 32px rgba(122,181,255,0.2);
}

/* 视频样式 */
video {
width: 100%;
border-radius: 10px;
margin: 12px 0 24px 0;
box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}

/* AI工具标签 */
.ai-tools {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin: 16px 0;
}

.ai-tools span {
background: #1a1a24;
color: #7ab5ff;
padding: 6px 12px;
border-radius: 30px;
font-size: 13px;
}

/* 平滑滚动 */
html {
scroll-behavior: smooth;
}
</style>
</head>

<body>
<div class="container">

<!-- 首页 -->
<div class="hero">
<h1>超现实大地艺术 · 传媒作品集</h1>
<p>电子杂志 | 摄影 | 影视创作 | AI艺术实验</p>
</div>

<!-- 一、葡夏之声电子杂志 -->
<div class="section">
<h2>一、葡夏之声电子杂志</h2>
<p>项目兼文案策划</p>

<video controls src="杂志视频1.mp4"></video>
<video controls src="杂志视频2.mp4"></video>
<video controls src="杂志视频3.mp4"></video>

<img src="获奖证书.jpg" style="width:100%; border-radius:8px; margin-top:20px;">
</div>

<!-- 二、摄影作品 -->
<div class="section">
<h2>二、摄影作品｜超现实大地艺术</h2>
<div class="grid">
<img src="摄影1.jpg">
<img src="摄影2.jpg">
<img src="摄影3.jpg">
<img src="摄影4.jpg">
<img src="摄影5.jpg">
<img src="摄影6.jpg">
</div>
</div>

<!-- 三、视频创作 -->
<div class="section">
<h2>三、视频创作</h2>
<p>策划 - 文案 - 拍摄 - 后期</p>

<video controls src="葡萄酒宣传片.mp4"></video>
<video controls src="盐池明长城科普.mp4"></video>
<video controls src="北方民族大学宣传.mp4"></video>
<video controls src="昆山血站献血宣传片.mp4"></video>
<video controls src="民运会短视频.mp4"></video>
<video controls src="苏州Z世代宣传片.mp4"></video>
</div>

<!-- 四、AI视频创作 -->
<div class="section">
<h2>四、AI视频创作</h2>
<p>文案大纲 - 分镜脚本 - 图片生成 - 视频生成 - 剪辑（字幕/配乐）- 成片</p>

<p>使用工具：</p>
<div class="ai-tools">
<span>Midjourney v7</span>
<span>Stable Diffusion</span>
<span>ChatGPT 4o</span>
<span>Photoshop</span>
<span>可灵AI</span>
<span>DeepSeek</span>
<span>Pika</span>
<span>Sora</span>
<span>Vidu</span>
<span>即梦AI</span>
<span>Runway</span>
<span>Luma AI</span>
</div>

<video controls src="AI视频1.mp4"></video>
<video controls src="AI视频2.mp4"></video>
<video controls src="AI视频3.mp4"></video>
</div>

</div>
</body>
</html>
